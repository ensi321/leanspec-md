/lean/v0/fork_choice:
  get:
    operationId: getForkChoiceView
    summary: Get fork-choice store view.
    description: |
      Returns a snapshot of the node's fork-choice tree above (or at) the
      latest finalized slot, with per-block fork-choice weights computed
      from the currently-counted attestation pool.

      PR #1104 reshaped the response: per-block detail is exposed as a
      flat `nodes` array (root, slot, parent_root, proposer_index, weight)
      filtered to blocks at or above `latest_finalized.slot`. The previous
      `time`, `validator_id`, raw `blocks` dict, and `pools` counters are
      no longer returned.

      `validator_count` is `null` when the head's post-state is absent,
      not `0`. Zero would read as "no validators" rather than
      "state unavailable".

      Used by debugging tools (forkmon, hive simulators) to inspect
      why a node selected its current head.
    tags:
      - Debug
    responses:
      '200':
        description: Fork-choice tree view rooted at the head.
        content:
          application/json:
            schema:
              $ref: '../../types/fork_choice.yaml#/components/schemas/ForkChoiceView'
      '503':
        description: '"Store not initialized" — node has no store yet.'
