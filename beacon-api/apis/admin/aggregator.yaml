#
# Admin routes under /lean/v0/admin are unauthenticated.
# Deployments must restrict access to them at the network layer (PR #1104).

/lean/v0/admin/aggregator:
  get:
    operationId: getAggregatorStatus
    summary: Get current aggregator role status.
    description: |
      Returns whether the node is currently configured as an aggregator.

      lstar-specific admin endpoint; no direct beacon-APIs precedent.

      Sources its value from the sync service's `is_aggregator` flag
      directly. PR #1104 removed the `AggregatorController` indirection
      and the write-only NetworkService aggregator copy.
    tags:
      - Admin
    responses:
      '200':
        description: Aggregator status.
        content:
          application/json:
            schema:
              type: object
              required: [is_aggregator]
              properties:
                is_aggregator:
                  type: boolean
                  description: True when the node performs attestation aggregation.
      '503':
        description: Aggregator role control not wired into this node.

  post:
    operationId: toggleAggregator
    summary: Toggle aggregator role at runtime.
    description: |
      Enables or disables the aggregator role without restarting the node.

      The body must be a JSON object with a single boolean field `enabled`.
      Loose-typed ints (`0`/`1`) are rejected because Python distinguishes
      them from booleans even where JSON parsers blur the two.

      Returns the new value plus the previous one so callers can detect
      no-op toggles. The handler logs an info line on a state change.
    tags:
      - Admin
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [enabled]
            properties:
              enabled:
                type: boolean
                description: Target aggregator role.
    responses:
      '200':
        description: New aggregator status plus the prior value.
        content:
          application/json:
            schema:
              type: object
              required: [is_aggregator, previous]
              properties:
                is_aggregator:
                  type: boolean
                previous:
                  type: boolean
      '400':
        description: |
          One of:
          - "Invalid JSON body" — request body is not valid JSON.
          - "Missing 'enabled' field in body" — JSON is not an object, or
            the `enabled` key is absent.
          - "'enabled' must be a boolean" — value is not a JSON boolean.
      '503':
        description: Aggregator role control not wired into this node.
