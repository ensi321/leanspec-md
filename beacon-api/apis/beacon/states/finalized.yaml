/lean/v0/states/finalized:
  get:
    operationId: getStateFinalized
    summary: Get the latest finalized state.
    description: |
      Returns the SSZ-encoded post-state of the latest finalized block.

      Used by checkpoint-sync clients to bootstrap from a trusted finalized
      anchor instead of replaying from genesis. The response is the SSZ
      encoding of the lstar State container; see
      `specs/lstar/beacon-chain.md#state`.
    tags:
      - Beacon
    responses:
      '200':
        description: SSZ-encoded finalized state.
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: SSZ-encoded State container.
      '404':
        description: |
          "Finalized state not available" — the store has no entry under
          `latest_finalized.root`. Distinct from 503 (no store yet).
      '500':
        description: |
          "Encoding failed" — the off-loop SSZ encoder raised. The handler
          runs `state.encode_bytes()` via `asyncio.to_thread` to keep the
          event loop responsive for full-state payloads.
      '503':
        description: |
          "Store not initialized" — the node has not yet wired its
          fork-choice store. Distinct from 404 (store exists, no state).
