components:
  schemas:
    ForkChoiceNode:
      type: object
      description: |
        One block in the fork-choice tree snapshot.
        See specs/lstar/fork-choice.md.
      required:
        - root
        - slot
        - parent_root
        - proposer_index
        - weight
      properties:
        root:
          $ref: './primitive.yaml#/components/schemas/Root'
        slot:
          $ref: './primitive.yaml#/components/schemas/Slot'
        parent_root:
          $ref: './primitive.yaml#/components/schemas/Root'
        proposer_index:
          type: integer
          description: Validator index of the block's proposer.
        weight:
          type: integer
          description: |
            Vote weight accumulated by this block from the currently-counted
            attestation pool (zero if no vote reached it).

    ForkChoiceView:
      type: object
      description: |
        Snapshot of the fork-choice tree at or above the latest finalized slot.
        PR #1104 reshaped the previous store-dump view into this flat node
        list with cross-cut head/checkpoint/safe-target fields.
        Cross-reference: specs/lstar/fork-choice.md.
      required:
        - nodes
        - head
        - justified
        - finalized
        - safe_target
        - validator_count
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/ForkChoiceNode'
          description: |
            All blocks in `store.blocks` with `block.slot >= latest_finalized.slot`.
        head:
          $ref: './primitive.yaml#/components/schemas/Root'
        justified:
          $ref: './api.yaml#/components/schemas/Checkpoint'
        finalized:
          $ref: './api.yaml#/components/schemas/Checkpoint'
          description: |
            Finalization as seen from the canonical head, **reorg-mutable**
            (PR #1128). Not irreversible economic finality.
        safe_target:
          $ref: './primitive.yaml#/components/schemas/Root'
        validator_count:
          oneOf:
            - type: integer
            - type: 'null'
          description: |
            Length of `store.states[store.head].validators`, or `null` when
            the head's post-state is absent (PR #1104). Reported as `null`,
            not `0`, so consumers cannot misread "state unavailable" as
            "no validators".
